services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pm_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/pm_db
      - SECRET_KEY=change-this-to-a-long-random-string-in-real-deployments
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/workspace

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - WDS_SOCKET_PORT=0
    depends_on:
      - backend
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules

volumes:
  postgres_data:
